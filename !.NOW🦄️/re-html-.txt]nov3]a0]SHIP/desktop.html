<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Desktop Environment</title>
    <link rel="stylesheet" href="css/desktop.css">
</head>
<body>
    <div id="desktop">
        <div id="toolbar">
            <button id="fileBtn">File</button>
            <div id="fileDropdown" class="dropdown-content" style="display: none;">
                <button id="openDesktop">Open Desktop</button>
                <button id="openSample">Open Sample App</button>
            </div>
            <button id="terminalBtn">Terminal</button>
            <button id="craftBtn">Craft</button>
            <button id="customizeBtn">Customize</button>
        </div>
    </div>
    
    <div id="context-menu" class="context-menu" style="display: none;">
        <button class="context-item" onclick="createTerminal()">Terminal</button>
        <button class="context-item" onclick="openDesktopWindow()">Desktop</button>
        <button class="context-item" onclick="openSampleApp()">Sample App</button>
    </div>
    
    <script src="js/window-manager.js"></script>
    <script src="js/desktop.js"></script>
    <script src="js/apps/sample-app.js"></script>
    <script src="js/apps/recursive-desktop.js"></script>
</body>
</html>
